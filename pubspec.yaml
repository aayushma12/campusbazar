name: campus_bazar
description: A campus marketplace application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management (BLoC)
  flutter_bloc: ^8.1.3
  
  # Dependency Injection
  get_it: ^7.6.0

  # Hive dependencies
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  
  # State management (Keep for existing UI)
  flutter_riverpod: ^2.3.6

  # Functional Programming (Either)
  dartz: ^0.10.1

  # API & Networking
  dio: ^5.0.0
  pretty_dio_logger: ^1.3.3

  # Secure Storage
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0

  # Equatable for value equality
  equatable: ^2.0.5
  image_picker: ^1.2.1
  permission_handler: ^11.3.1
  image_cropper: ^8.1.0
  flutter_image_compress: ^2.3.0
  webview_flutter: ^4.7.0
  socket_io_client: ^3.1.2
  sensors_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test_cov_console: ^0.2.2

  # Code generation for Hive
  build_runner: ^2.3.3
  hive_generator: ^2.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/image/logo.png
    - assets/image/onboarding1.png
    - assets/image/onboarding2.png
    - assets/image/onboarding3.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
